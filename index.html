<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaique Rifas</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js?v=400"></script>

  <style>
    body{
      font-family:Arial,sans-serif;
      background:#f3f3f3;
      margin:0;
      padding:20px;
    }

    .card{
      background:#fff;
      padding:20px;
      border-radius:14px;
      max-width:700px;
      margin:0 auto;
    }

    h2{
      margin-top:0;
      font-size:28px;
    }

    p{
      font-size:18px;
      line-height:1.6;
      margin:10px 0;
      white-space:pre-line;
    }
  </style>
</head>
<body>

<div class="card">
  <h2 id="titulo">Rifa</h2>
  <p id="status">Carregando...</p>
  <p id="valor"></p>
  <p id="premio"></p>
  <p id="pix"></p>
</div>

<script>
function formatarReal(v){
  return Number(v || 0).toLocaleString("pt-BR", {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  })
}

async function carregar(){
  const { data, error } = await sb
    .from("campaigns")
    .select("*")
    .order("id", { ascending: false })
    .limit(1)

  if (error || !data || data.length === 0){
    document.getElementById("titulo").innerText = "Rifa"
    document.getElementById("status").innerText = "Rifa desligada"
    document.getElementById("valor").innerText = ""
    document.getElementById("premio").innerText = ""
    document.getElementById("pix").innerText = ""
    return
  }

  const campanha = data[0]

  if (!campanha.ativa){
    document.getElementById("titulo").innerText = "Rifa"
    document.getElementById("status").innerText = "Rifa desligada"
    document.getElementById("valor").innerText = ""
    document.getElementById("premio").innerText = ""
    document.getElementById("pix").innerText = ""
    return
  }

  document.getElementById("titulo").innerText = campanha.nome_rifa || "Rifa"
  document.getElementById("status").innerText = "Rifa ligada"
  document.getElementById("valor").innerText = "Valor: R$ " + formatarReal(campanha.valor)
  document.getElementById("premio").innerText = campanha.premiacao ? "Premiações:\n" + campanha.premiacao : ""
  document.getElementById("pix").innerText = campanha.chave_pix ? "Pix: " + campanha.chave_pix : ""
}

carregar()
setInterval(carregar, 2000)
</script>

</body>
</html>
