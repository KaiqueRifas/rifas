<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kaique Rifas</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

</head>

<body>

<header class="topo">

<h1>Kaique Rifas</h1>

<div>

<span id="userEmail"></span>

<button onclick="logout()">Sair</button>

</div>

</header>


<section class="card">

<h2>Rifa ativa</h2>

<p id="statusRifa">Carregando...</p>

<p id="valorRifa"></p>

</section>


<section class="card">

<h2>Itens disponíveis</h2>

<div class="grid" id="gridBichos"></div>

</section>


<section class="card" id="pixBox" style="display:none">

<h2>Pagamento</h2>

<p>Faça o pagamento via PIX</p>

<input id="pixChave" readonly>

<button onclick="copiarPix()">Copiar chave PIX</button>

<p>Após pagar envie o comprovante</p>

</section>


<script>

const grid = document.getElementById("gridBichos")
const pixBox = document.getElementById("pixBox")

let chavePix = ""

async function carregarUsuario(){

const { data } = await sb.auth.getUser()

if(!data.user){

window.location.href="login.html"
return

}

document.getElementById("userEmail").innerText = data.user.email

}


async function carregarCampanha(){

const { data } = await sb
.from("campaigns")
.select("*")
.eq("id",1)
.single()

document.getElementById("statusRifa").innerText =
data.ativa ? "Campanha ligada":"Campanha desligada"

document.getElementById("valorRifa").innerText =
"Valor: R$ "+data.valor

chavePix = data.chave_pix

document.getElementById("pixChave").value = chavePix

}


async function carregarItens(){

const { data } = await sb
.from("items")
.select("*")
.order("id")

grid.innerHTML=""

data.forEach(item=>{

const div = document.createElement("div")

div.className = "bicho "+item.status

div.innerHTML=`

<h3>${item.nome}</h3>

<p>Status: ${item.status}</p>

<p>Valor: R$ ${item.valor}</p>

`

if(item.status==="livre"){

div.onclick=()=>reservar(item.id)

}

grid.appendChild(div)

})

}


async function reservar(id){

const { data } = await sb.auth.getUser()

const reservadoEm = new Date()

const reservadoAte = new Date(Date.now()+5*60*1000)

await sb
.from("items")
.update({

status:"reservado",
usuario_id:data.user.id,
reservado_em:reservadoEm,
reservado_ate:reservadoAte

})
.eq("id",id)

pixBox.style.display="block"

carregarItens()

}


function copiarPix(){

navigator.clipboard.writeText(chavePix)

alert("Chave PIX copiada")

}


async function logout(){

await sb.auth.signOut()

window.location.href="login.html"

}


async function iniciar(){

await carregarUsuario()

await carregarCampanha()

await carregarItens()

}

iniciar()

</script>

</body>
</html>
