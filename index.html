<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rifa</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js?v=1500"></script>

<style>
body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

.topo{
display:flex;
justify-content:space-between;
align-items:flex-start;
margin-bottom:10px;
gap:10px;
}

.userinfo{
font-size:14px;
}

.botoes-topo{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.logout{
background:#c0392b;
padding:8px 14px;
border-radius:6px;
color:white;
border:none;
cursor:pointer;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.item{
padding:20px;
border-radius:10px;
text-align:center;
font-weight:bold;
cursor:pointer;
}

.livre{
background:#9be29b;
}

.reservado{
background:#ffd27a;
cursor:default;
}

.pago{
background:#7fb3ff;
cursor:default;
}

.indisponivel{
background:#ddd;
cursor:default;
}

.msgtopo{
margin-top:6px;
font-weight:bold;
color:#0b3d91;
}
</style>

</head>

<body>

<div class="container">

<div class="topo">

<div class="userinfo">
<div id="email"></div>
<div id="saldo"></div>
<div id="mensagem" class="msgtopo"></div>
</div>

<div class="botoes-topo">
<button class="logout" onclick="logout()">Sair</button>
</div>

</div>

<div class="card" id="card-rifa">
Carregando rifa...
</div>

<div class="card">

<h3>Escolha seu bicho</h3>

<div class="grid" id="grid-itens"></div>

</div>

</div>

<script>
let usuario = null
let perfilAtual = null

async function verificarLogin(){
  const { data } = await sb.auth.getUser()

  if(!data.user){
    window.location.href = "login.html"
    return false
  }

  usuario = data.user

  document.getElementById("email").innerText =
    "Conta: " + usuario.email

  return true
}

async function carregarPerfil(){
  const { data, error } = await sb
    .from("profiles")
    .select("*")
    .eq("id", usuario.id)
    .limit(1)

  if(error || !data || data.length === 0){
    perfilAtual = null
    document.getElementById("saldo").innerText = "Saldo: R$ 0,00"
    return
  }

  perfilAtual = data[0]
  const saldo = Number(perfilAtual.saldo || 0)

  document.getElementById("saldo").innerText =
    "Saldo: R$ " + saldo.toLocaleString("pt-BR", {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    })
}

async function logout(){
  await sb.auth.signOut()
  window.location.href = "login.html"
}

function formatarReal(v){
  return Number(v || 0).toLocaleString("pt-BR", {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  })
}

async function buscarCampanha(){
  const { data } = await sb
    .from("campaigns")
    .select("*")
    .order("id", { ascending: false })
    .limit(1)

  if(!data || data.length === 0) return null

  return data[0]
}

async function carregarRifa(){
  const campanha = await buscarCampanha()
  const card = document.getElementById("card-rifa")

  if(!campanha || !campanha.ativa){
    card.innerHTML = `
      <h2>Rifa</h2>
      <p>Rifa desligada</p>
    `
    return null
  }

  card.innerHTML = `
    <h2>${campanha.nome_rifa}</h2>
    <p>Rifa ligada</p>
    <p>Valor: R$ ${formatarReal(campanha.valor)}</p>
    <p>Premiações:</p>
    <p>${campanha.premiacao || ""}</p>
  `

  return campanha
}

async function reservar(itemId){
  document.getElementById("mensagem").innerText = ""

  const campanha = await buscarCampanha()

  if(!campanha || !campanha.ativa){
    document.getElementById("mensagem").innerText = "Rifa desligada"
    return
  }

  await carregarPerfil()

  if(!perfilAtual){
    document.getElementById("mensagem").innerText = "Perfil não encontrado"
    return
  }

  const saldoAtual = Number(perfilAtual.saldo || 0)
  const valorBicho = Number(campanha.valor || 0)

  if(saldoAtual < valorBicho){
    document.getElementById("mensagem").innerText = "Saldo insuficiente"
    return
  }

  const { data: itemData, error: itemErro } = await sb
    .from("items")
    .select("*")
    .eq("id", itemId)
    .limit(1)

  if(itemErro || !itemData || itemData.length === 0){
    document.getElementById("mensagem").innerText = "Item não encontrado"
    return
  }

  const item = itemData[0]

  if(item.status === "reservado" || item.status === "pago" || item.confirmado === true || item.pago === true){
    document.getElementById("mensagem").innerText = "Esse bicho já não está livre"
    return
  }

  const { data: minhasReservas } = await sb
    .from("items")
    .select("id")
    .eq("usuario_id", usuario.id)
    .eq("status", "reservado")

  if(minhasReservas && minhasReservas.length > 0){
    document.getElementById("mensagem").innerText = "Usuário já possui reserva"
    return
  }

  const novoSaldo = saldoAtual - valorBicho

  const { error: erroItem } = await sb
    .from("items")
    .update({
      status: "reservado",
      reservado_email: usuario.email,
      reservado_telefone: perfilAtual.telefone || "",
      usuario_id: usuario.id,
      reserved_by: usuario.id,
      reservado_em: new Date().toISOString()
    })
    .eq("id", itemId)

  if(erroItem){
    document.getElementById("mensagem").innerText = erroItem.message
    return
  }

  const { error: erroSaldo } = await sb
    .from("profiles")
    .update({
      saldo: novoSaldo
    })
    .eq("id", usuario.id)

  if(erroSaldo){
    document.getElementById("mensagem").innerText = erroSaldo.message
    return
  }

  document.getElementById("mensagem").innerText = "Bicho reservado com sucesso"
  await carregarPerfil()
  await carregarItens()
}

async function carregarItens(){
  const campanha = await buscarCampanha()

  const { data } = await sb
    .from("items")
    .select("*")
    .order("id", { ascending: true })

  const grid = document.getElementById("grid-itens")
  grid.innerHTML = ""

  if(!data || data.length === 0){
    grid.innerHTML = "<p>Nenhum item encontrado.</p>"
    return
  }

  data.forEach(item => {
    let classe = "livre"
    let status = "Livre"
    let acao = `onclick="reservar(${item.id})"`

    if(!campanha || !campanha.ativa){
      classe = "indisponivel"
      status = "Indisponível"
      acao = ""
    }else if(item.status === "reservado"){
      classe = "reservado"
      status = item.usuario_id === usuario.id ? "Reservado por você" : "Reservado"
      acao = ""
    }else if(item.status === "pago" || item.confirmado === true || item.pago === true){
      classe = "pago"
      status = item.usuario_id === usuario.id ? "Pago por você" : "Pago"
      acao = ""
    }

    grid.innerHTML += `
      <div class="item ${classe}" ${acao}>
        ${item.nome}<br>
        ${status}<br>
        R$ ${formatarReal(campanha ? campanha.valor : 0)}
      </div>
    `
  })
}

async function iniciar(){
  const ok = await verificarLogin()
  if(!ok) return

  await carregarPerfil()
  await carregarRifa()
  await carregarItens()
}

iniciar()
</script>

</body>
</html>
