<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rifa</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js?v=1600"></script>

<style>
body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

.topo{
display:flex;
justify-content:space-between;
align-items:flex-start;
margin-bottom:10px;
gap:10px;
}

.userinfo{
font-size:14px;
}

.botoes-topo{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.logout{
background:#c0392b;
padding:8px 14px;
border-radius:6px;
color:white;
border:none;
cursor:pointer;
}

.saque{
background:#27ae60;
padding:8px 14px;
border-radius:6px;
color:white;
border:none;
cursor:pointer;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.item{
padding:20px;
border-radius:10px;
text-align:center;
font-weight:bold;
cursor:pointer;
}

.livre{
background:#9be29b;
}

.reservado{
background:#ffd27a;
cursor:default;
}

.pago{
background:#7fb3ff;
cursor:default;
}

.indisponivel{
background:#ddd;
cursor:default;
}

.msgtopo{
margin-top:6px;
font-weight:bold;
color:#0b3d91;
}
</style>

</head>

<body>

<div class="container">

<div class="topo">

<div class="userinfo">
<div id="email"></div>
<div id="saldo"></div>
<div id="mensagem" class="msgtopo"></div>
</div>

<div class="botoes-topo">
<button class="saque" onclick="window.location.href='saque.html'">Saque</button>
<button class="logout" onclick="logout()">Sair</button>
</div>

</div>

<div class="card" id="card-rifa">
Carregando rifa...
</div>

<div class="card">

<h3>Escolha seu bicho</h3>

<div class="grid" id="grid-itens"></div>

</div>

</div>

<script>
let usuario = null
let perfilAtual = null

async function verificarLogin(){
const { data } = await sb.auth.getUser()

if(!data.user){
window.location.href="login.html"
return
}

usuario = data.user
document.getElementById("email").innerText="Conta: "+usuario.email
}

async function carregarPerfil(){
const { data } = await sb
.from("profiles")
.select("*")
.eq("id",usuario.id)
.limit(1)

perfilAtual=data[0]

document.getElementById("saldo").innerText=
"Saldo: R$ "+Number(perfilAtual.saldo||0).toLocaleString("pt-BR",{minimumFractionDigits:2})
}

async function logout(){
await sb.auth.signOut()
window.location.href="login.html"
}

async function buscarCampanha(){
const { data } = await sb
.from("campaigns")
.select("*")
.order("id",{ascending:false})
.limit(1)

return data[0]
}

async function carregarRifa(){

const campanha=await buscarCampanha()
const card=document.getElementById("card-rifa")

if(!campanha || !campanha.ativa){

card.innerHTML=`
<h2>Rifa</h2>
<p>Rifa desligada</p>
`

return
}

card.innerHTML=`
<h2>${campanha.nome_rifa}</h2>
<p>Rifa ligada</p>
<p>Valor: R$ ${Number(campanha.valor).toLocaleString("pt-BR",{minimumFractionDigits:2})}</p>
<p>${campanha.premiacao||""}</p>
`
}

async function reservar(id){

const campanha=await buscarCampanha()

if(!campanha || !campanha.ativa){
document.getElementById("mensagem").innerText="Rifa desligada"
return
}

await carregarPerfil()

if(perfilAtual.saldo < campanha.valor){
document.getElementById("mensagem").innerText="Saldo insuficiente"
return
}

const novoSaldo=perfilAtual.saldo-campanha.valor

await sb
.from("items")
.update({
status:"reservado",
usuario_id:usuario.id,
reservado_email:usuario.email
})
.eq("id",id)

await sb
.from("profiles")
.update({
saldo:novoSaldo
})
.eq("id",usuario.id)

document.getElementById("mensagem").innerText="Bicho reservado"

await carregarPerfil()
await carregarItens()
}

async function carregarItens(){

const campanha=await buscarCampanha()

const { data } = await sb
.from("items")
.select("*")
.order("id",{ascending:true})

const grid=document.getElementById("grid-itens")
grid.innerHTML=""

data.forEach(item=>{

let classe="livre"
let status="Livre"
let click=`onclick="reservar(${item.id})"`

if(!campanha || !campanha.ativa){
classe="indisponivel"
status="Indisponível"
click=""
}
else if(item.status==="reservado"){
classe="reservado"
status="Reservado"
click=""
}

grid.innerHTML+=`
<div class="item ${classe}" ${click}>
${item.nome}<br>
${status}<br>
R$ ${Number(campanha?campanha.valor:0).toLocaleString("pt-BR",{minimumFractionDigits:2})}
</div>
`

})

}

async function iniciar(){
await verificarLogin()
await carregarPerfil()
await carregarRifa()
await carregarItens()
}

iniciar()
</script>

</body>
</html>
