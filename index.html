<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rifa</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.item{
padding:20px;
border-radius:10px;
text-align:center;
font-weight:bold;
}

.livre{
background:#9be29b;
}

.reservado{
background:#ffd27a;
}

.pago{
background:#7fb3ff;
}

.indisponivel{
background:#ddd;
}

.topo{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.logout{
background:#c0392b;
padding:8px 14px;
border-radius:6px;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<div class="topo">

<h2>Rifa</h2>

<button class="logout" onclick="logout()">
Sair
</button>

</div>

<div class="card" id="card-rifa">
Carregando rifa...
</div>

<div class="card">

<h3>Escolha seu bicho</h3>

<div class="grid" id="grid-itens"></div>

</div>

</div>

<script>

async function verificarLogin(){

const { data } = await sb.auth.getSession()

if(!data.session){

window.location.href = "login.html"

}

}

async function logout(){

await sb.auth.signOut()

window.location.href = "login.html"

}

function formatarReal(v){

return Number(v || 0).toLocaleString("pt-BR",{
minimumFractionDigits:2,
maximumFractionDigits:2
})

}

async function buscarCampanha(){

const { data } = await sb
.from("campaigns")
.select("*")
.order("id",{ascending:false})
.limit(1)

if(!data || data.length===0) return null

return data[0]

}

async function carregarRifa(){

const campanha = await buscarCampanha()

const card = document.getElementById("card-rifa")

if(!campanha || !campanha.ativa){

card.innerHTML = `
<h2>Rifa</h2>
<p>Rifa desligada</p>
`

return

}

card.innerHTML = `
<h2>${campanha.nome_rifa}</h2>
<p>Valor: R$ ${formatarReal(campanha.valor)}</p>
<p>${campanha.premiacao}</p>
`

}

async function carregarItens(){

const campanha = await buscarCampanha()

const { data } = await sb
.from("items")
.select("*")
.order("id",{ascending:true})

const grid = document.getElementById("grid-itens")

grid.innerHTML = ""

data.forEach(item=>{

let classe="livre"
let status="Livre"

if(!campanha || !campanha.ativa){

classe="indisponivel"
status="Indisponível"

}else if(item.status==="reservado"){

classe="reservado"
status="Reservado"

}else if(item.status==="pago"){

classe="pago"
status="Pago"

}

grid.innerHTML += `
<div class="item ${classe}">
${item.nome}<br>
${status}<br>
R$ ${formatarReal(campanha ? campanha.valor : 0)}
</div>
`

})

}

async function iniciar(){

await verificarLogin()

await carregarRifa()

await carregarItens()

}

iniciar()

</script>

</body>
</html>
