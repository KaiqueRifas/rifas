<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaique Rifas</title>

  <link rel="stylesheet" href="style.css?v=81">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js?v=81"></script>

  <style>
    .toast-msg{
      position:fixed;
      left:50%;
      bottom:20px;
      transform:translateX(-50%);
      background:#0d2d5f;
      color:#fff;
      padding:12px 16px;
      border-radius:12px;
      font-size:14px;
      box-shadow:0 6px 18px rgba(0,0,0,0.2);
      z-index:9999;
      opacity:0;
      pointer-events:none;
      transition:opacity .2s ease, transform .2s ease;
      max-width:90%;
      text-align:center;
    }

    .toast-msg.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<header class="topo">
  <h1>Kaique Rifas</h1>

  <div>
    <span id="userEmail"></span>
    <button onclick="logout()">Sair</button>
  </div>
</header>

<section class="card">
  <h2>Rifa ativa</h2>
  <p id="statusRifa">Carregando...</p>
  <p id="premiacaoRifa"></p>
</section>

<section class="card">
  <h2>Itens disponíveis</h2>
  <div class="grid" id="gridBichos"></div>
</section>

<section class="card" id="pixBox" style="display:none">
  <h2>Pagamento PIX</h2>
  <input id="pixChave" readonly>
  <br><br>
  <button onclick="copiarPix()">Copiar chave PIX</button>
</section>

<div id="toastMsg" class="toast-msg"></div>

<script>
const grid = document.getElementById("gridBichos")
const pixBox = document.getElementById("pixBox")
const toastMsg = document.getElementById("toastMsg")

let chavePix = ""
let userId = ""
let userEmail = ""
let userTelefone = ""
let rifaAtiva = false
let toastTimer = null

function mostrarToast(texto){
  toastMsg.innerText = texto
  toastMsg.classList.add("show")

  clearTimeout(toastTimer)
  toastTimer = setTimeout(() => {
    toastMsg.classList.remove("show")
  }, 2200)
}

async function carregarUsuario(){
  const { data } = await sb.auth.getUser()

  if (!data.user){
    window.location.href = "login.html"
    return
  }

  userId = data.user.id
  userEmail = data.user.email || ""
  document.getElementById("userEmail").innerText = userEmail

  const { data: profile } = await sb
    .from("profiles")
    .select("*")
    .eq("id", userId)
    .maybeSingle()

  if (profile){
    userTelefone = profile.telefone || ""
  } else {
    await sb.from("profiles").insert({
      id: userId,
      email: userEmail,
      telefone: ""
    })
    userTelefone = ""
  }
}

async function carregarCampanha(){
  const { data, error } = await sb
    .from("campaigns")
    .select("*")
    .order("id", { ascending: true })
    .limit(1)
    .maybeSingle()

  if (error || !data){
    rifaAtiva = false
    document.getElementById("statusRifa").innerText = "Rifa desligada"
    document.getElementById("premiacaoRifa").innerText = ""
    document.getElementById("pixChave").value = ""
    chavePix = ""
    return
  }

  rifaAtiva = !!data.ativa
  chavePix = data.chave_pix || ""

  document.getElementById("statusRifa").innerText =
    rifaAtiva ? "Rifa ligada" : "Rifa desligada"

  document.getElementById("premiacaoRifa").innerText =
    data.premiacao ? "Premiações: " + data.premiacao : ""

  document.getElementById("pixChave").value = chavePix
}

async function carregarItens(){
  await carregarCampanha()

  const { data } = await sb
    .from("items")
    .select("*")
    .order("id")

  grid.innerHTML = ""

  let temReservaMinha = false

  ;(data || []).forEach(item => {
    const div = document.createElement("div")

    let classe = "livre"
    let textoStatus = "Livre"

    if (!rifaAtiva){
      classe = "pago-outro"
      textoStatus = "Indisponível"
    } else {
      if (item.status === "livre"){
        classe = "livre"
        textoStatus = "Livre"
      }

      if (item.status === "reservado" && item.usuario_id !== userId){
        classe = "reservado-outro"
        textoStatus = "Reservado"
      }

      if (item.status === "reservado" && item.usuario_id === userId){
        classe = "reservado-meu"
        textoStatus = "Reservado"
        temReservaMinha = true
      }

      if (item.status === "pago" && item.usuario_id !== userId){
        classe = "pago-outro"
        textoStatus = "Pago"
      }

      if (item.status === "pago" && item.usuario_id === userId){
        classe = "pago-meu"
        textoStatus = "Pago"
      }
    }

    div.className = "bicho " + classe
    div.innerHTML = `
      <h3>${item.nome}</h3>
      <p class="status-card">${textoStatus}</p>
    `

    if (rifaAtiva && item.status === "livre"){
      div.style.cursor = "pointer"
      div.onclick = () => reservar(item.id)
    } else {
      div.style.cursor = "default"
      div.onclick = () => {
        if (!rifaAtiva){
          mostrarToast("Rifa desligada")
        }
      }
    }

    grid.appendChild(div)
  })

  pixBox.style.display = (rifaAtiva && temReservaMinha) ? "block" : "none"
}

async function reservar(id){
  await carregarCampanha()

  if (!rifaAtiva){
    await carregarItens()
    mostrarToast("Rifa desligada")
    return
  }

  mostrarToast("Reserva liberada só quando a rifa estiver ligada")
}

function copiarPix(){
  navigator.clipboard.writeText(chavePix)
  mostrarToast("Chave PIX copiada")
}

async function logout(){
  await sb.auth.signOut()
  window.location.href = "login.html"
}

async function iniciar(){
  await carregarUsuario()
  await carregarItens()

  setInterval(async () => {
    await carregarItens()
  }, 1500)
}

iniciar()
</script>

</body>
</html>
