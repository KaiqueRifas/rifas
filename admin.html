<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin</title>

  <link rel="stylesheet" href="style.css?v=500">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js?v=500"></script>
</head>
<body>

  <div class="card">
    <h1>Editar rifa</h1>

    <input id="nome" placeholder="Nome da rifa">
    <input id="valor" placeholder="Valor da rifa">
    <textarea id="premio" placeholder="Premiações" rows="4"></textarea>

    <div class="acoes">
      <button onclick="salvar()">Salvar</button>
      <button onclick="desligar()">Desligar rifa</button>
    </div>

    <p id="msg"></p>
  </div>

  <script src="admin.js?v=500"></script>
</body>
</html>
