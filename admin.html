<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js?v=300"></script>

  <style>
    body{
      font-family:Arial,sans-serif;
      background:#f3f3f3;
      margin:0;
      padding:20px;
    }

    .card{
      background:#fff;
      padding:20px;
      border-radius:14px;
      max-width:700px;
      margin:0 auto;
    }

    h1{
      margin-top:0;
      font-size:28px;
    }

    input,textarea{
      width:100%;
      padding:14px;
      margin-top:12px;
      font-size:18px;
      box-sizing:border-box;
      border:1px solid #bbb;
      border-radius:10px;
    }

    button{
      padding:12px 20px;
      font-size:18px;
      margin-top:14px;
      margin-right:10px;
      border:none;
      border-radius:10px;
      background:#0d2d5f;
      color:#fff;
      font-weight:bold;
    }

    #msg{
      margin-top:18px;
      font-size:18px;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Editar rifa</h1>

  <input id="nome" placeholder="Nome da rifa">
  <input id="valor" placeholder="Valor da rifa">
  <textarea id="premio" placeholder="Premiações" rows="4"></textarea>
  <input id="pix" placeholder="Pix">

  <button onclick="salvar()">Salvar</button>
  <button onclick="desligar()">Desligar rifa</button>

  <p id="msg"></p>
</div>

<script>
let campanhaId = null

function tratarValor(v){
  const limpo = String(v || "")
    .replace(/\s/g, "")
    .replace(/\./g, "")
    .replace(",", ".")
  const numero = parseFloat(limpo)
  return isNaN(numero) ? 0 : numero
}

function formatarValorInput(v){
  if(v === null || v === undefined || v === "") return ""
  return Number(v).toLocaleString("pt-BR", {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  })
}

async function buscarCampanha() {
  const { data, error } = await sb
    .from("campaigns")
    .select("*")
    .order("id", { ascending: false })
    .limit(1)
    .maybeSingle()

  if (error) {
    document.getElementById("msg").innerText = error.message
    return null
  }

  if (data) return data

  const { data: nova, error: erroNova } = await sb
    .from("campaigns")
    .insert({
      ativa: false,
      titulo: "",
      valor: 0,
      premiacao: "",
      chave_pix: "",
      nome_rifa: ""
    })
    .select()
    .limit(1)
    .maybeSingle()

  if (erroNova) {
    document.getElementById("msg").innerText = erroNova.message
    return null
  }

  return nova
}

async function carregar() {
  const campanha = await buscarCampanha()
  if (!campanha) {
    document.getElementById("msg").innerText = "Campanha não encontrada"
    return
  }

  campanhaId = campanha.id

  document.getElementById("nome").value = campanha.nome_rifa || ""
  document.getElementById("valor").value = formatarValorInput(campanha.valor)
  document.getElementById("premio").value = campanha.premiacao || ""
  document.getElementById("pix").value = campanha.chave_pix || ""

  document.getElementById("msg").innerText = campanha.ativa ? "Rifa ligada" : "Rifa desligada"
}

async function salvar() {
  const campanha = await buscarCampanha()
  if (!campanha) {
    document.getElementById("msg").innerText = "Campanha não encontrada"
    return
  }

  campanhaId = campanha.id

  const nome = document.getElementById("nome").value.trim()
  const valor = tratarValor(document.getElementById("valor").value)
  const premio = document.getElementById("premio").value.trim()
  const pix = document.getElementById("pix").value.trim()

  const { error } = await sb
    .from("campaigns")
    .update({
      nome_rifa: nome,
      titulo: nome,
      valor: valor,
      premiacao: premio,
      chave_pix: pix,
      ativa: true
    })
    .eq("id", campanhaId)

  if (error) {
    document.getElementById("msg").innerText = error.message
    return
  }

  await carregar()
  document.getElementById("msg").innerText = "Rifa salva e ligada"
}

async function desligar() {
  const campanha = await buscarCampanha()
  if (!campanha) {
    document.getElementById("msg").innerText = "Campanha não encontrada"
    return
  }

  campanhaId = campanha.id

  const { error } = await sb
    .from("campaigns")
    .update({
      ativa: false,
      nome_rifa: "",
      titulo: "",
      valor: 0,
      premiacao: "",
      chave_pix: ""
    })
    .eq("id", campanhaId)

  if (error) {
    document.getElementById("msg").innerText = error.message
    return
  }

  document.getElementById("nome").value = ""
  document.getElementById("valor").value = ""
  document.getElementById("premio").value = ""
  document.getElementById("pix").value = ""

  document.getElementById("msg").innerText = "Rifa desligada"
}

carregar()
</script>

</body>
</html>
