<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Saque</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js?v=1900"></script>

<style>
body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
margin:0;
}

.container{
max-width:600px;
margin:auto;
}

.topo{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.topo-botoes{
display:flex;
gap:10px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
padding:12px;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
font-size:16px;
}

.btn-saque{
background:#27ae60;
width:100%;
}

.btn-voltar{
background:#0b3d91;
}

.btn-sair{
background:#c0392b;
}

.item{
border-bottom:1px solid #eee;
padding:12px 0;
font-size:17px;
}

.msg{
margin-top:10px;
font-weight:bold;
}

.info{
font-size:18px;
margin-bottom:6px;
}
</style>

</head>

<body>

<div class="container">

<div class="topo">

<h2>Saque</h2>

<div class="topo-botoes">
<button class="btn-voltar" onclick="voltar()">Voltar</button>
<button class="btn-sair" onclick="logout()">Sair</button>
</div>

</div>

<div class="card">
<div id="email" class="info"></div>
<div id="saldo" class="info"></div>
</div>

<div class="card">

<h2>Solicitar saque</h2>

<input id="valor" placeholder="Valor">
<input id="pix" placeholder="Chave Pix">

<button class="btn-saque" onclick="solicitar()">Solicitar saque</button>

<div id="msg" class="msg"></div>

</div>

<div class="card">

<h3>Histórico de saques</h3>

<div id="historico"></div>

</div>

</div>

<script>

let usuario = null
let perfilAtual = null

function formatarReal(v){
return Number(v || 0).toLocaleString("pt-BR",{minimumFractionDigits:2})
}

function formatarData(data){

const d = new Date(data)

return d.toLocaleDateString("pt-BR") +
" " +
d.toLocaleTimeString("pt-BR")
}

function tratarValor(valor){
const limpo = String(valor || "")
.replace(/\./g,"")
.replace(",",".")
return parseFloat(limpo) || 0
}

async function verificarLogin(){

const { data } = await sb.auth.getUser()

if(!data.user){
window.location.href="login.html"
return false
}

usuario = data.user
return true

}

async function carregarPerfil(){

const { data } = await sb
.from("profiles")
.select("*")
.eq("id",usuario.id)
.limit(1)

perfilAtual = data[0]

document.getElementById("email").innerText =
"Conta: "+usuario.email

document.getElementById("saldo").innerText =
"Saldo: R$ "+formatarReal(perfilAtual.saldo)

}

async function solicitar(){

document.getElementById("msg").innerText=""

const valor = tratarValor(document.getElementById("valor").value)
const pix = document.getElementById("pix").value

if(valor <= 0){
document.getElementById("msg").innerText="Valor inválido"
return
}

if(!pix){
document.getElementById("msg").innerText="Preencha a chave pix"
return
}

await carregarPerfil()

if(valor > perfilAtual.saldo){
document.getElementById("msg").innerText="Saldo insuficiente"
return
}

const novoSaldo = perfilAtual.saldo - valor

await sb
.from("profiles")
.update({ saldo:novoSaldo })
.eq("id",usuario.id)

await sb
.from("saques")
.insert({
usuario_id:usuario.id,
email:usuario.email,
valor:valor,
pix:pix,
status:"pendente"
})

document.getElementById("msg").innerText="Saque solicitado"

document.getElementById("valor").value=""
document.getElementById("pix").value=""

await carregarPerfil()
await carregarHistorico()

}

async function carregarHistorico(){

const { data } = await sb
.from("saques")
.select("*")
.eq("usuario_id",usuario.id)
.order("id",{ascending:false})

const div = document.getElementById("historico")

div.innerHTML=""

if(!data || data.length===0){
div.innerHTML="<div class='item'>Nenhum saque</div>"
return
}

data.forEach(s=>{

div.innerHTML += `
<div class="item">
Valor: R$ ${formatarReal(s.valor)} <br>
Status: ${s.status} <br>
Data: ${formatarData(s.created_at)}
</div>
`

})

}

function voltar(){
window.location.href="index.html"
}

async function logout(){
await sb.auth.signOut()
window.location.href="login.html"
}

async function iniciar(){

const ok = await verificarLogin()

if(!ok) return

await carregarPerfil()
await carregarHistorico()

}

iniciar()

</script>

</body>
</html>
